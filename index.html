<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çipil - Kesin Çalışan Şikayet Hattı</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --muted: #94a3b8; --border: #334155; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { width: 100%; max-width: 500px; background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 12px; }
        h2 { margin-bottom: 20px; border-left: 4px solid var(--accent); padding-left: 10px; font-size: 1.4rem; }
        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 0.9rem; }
        input[type="text"], select, textarea, input[type="file"] { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: white; outline: none; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .notif { display: none; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); color: var(--success); padding: 12px; border-radius: 6px; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Şikayet Bildirim Formu (Site 1)</h2>
    <div id="msg" class="notif">✔ Şikayetiniz başarıyla iletildi!</div>
    
    <form id="compForm" action="https://formspree.io/f/BURAYA_KENDİ_EPOSTA_ADRESİNİ_YAZ" method="POST" enctype="multipart/form-data">
        <div class="group">
            <label>Adınız Soyadınız</label>
            <input type="text" name="Kullanici_Adi" placeholder="Adınızı yazın..." required>
        </div>
        <div class="group">
            <label>Şikayet Konusu</label>
            <select name="Kategori" required>
                <option value="Tasarım / Arayüz">Tasarım Hataları</option>
                <option value="Sistem / Kod">Kodlama Problemi</option>
                <option value="Öneri">Önerim Var</option>
            </select>
        </div>
        <div class="group">
            <label>Şikayet Metni (Güvenli Şifrelenecek)</label>
            <textarea id="plainText" rows="4" placeholder="Sorunu anlatın..." required></textarea>
            <input type="hidden" name="Sifreli_Mesaj" id="encryptedText">
        </div>
        <div class="group">
            <label>Ekran Fotoğrafı Yükle</label>
            <input type="file" name="Ekran_Goruntusu" accept="image/*">
        </div>
        <button type="submit" class="btn">Garantili Yolla</button>
    </form>
</div>

<script>
    const SECRET_KEY = "CipilKriptoAnahtari123";

    document.getElementById('compForm').addEventListener('submit', function(e) {
        const plainText = document.getElementById('plainText').value;
        
        // Mesajı göndermeden hemen önce AES ile şifreliyoruz, kimse çalamaz
        const encrypted = CryptoJS.AES.encrypt(plainText, SECRET_KEY).toString();
        document.getElementById('encryptedText').value = encrypted;
    });
</script>
</body>
</html>
