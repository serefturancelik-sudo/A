<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çipil - Direkt Şikayet Formu</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --muted: #94a3b8; --border: #334155; --success: #10b981; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { width: 100%; max-width: 500px; background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 12px; }
        h2 { margin-bottom: 20px; border-left: 4px solid var(--accent); padding-left: 10px; font-size: 1.4rem; }
        .group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 0.9rem; }
        input[type="text"], select, textarea, input[type="file"] { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: white; outline: none; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .notif { display: none; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); color: var(--success); padding: 12px; border-radius: 6px; text-align: center; margin-bottom: 15px; }
        .status { font-size: 0.85rem; color: var(--muted); text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Direkt Şikayet Formu (Site 1)</h2>
    <div id="msg" class="notif">✔ Şikayetiniz direkt havuzunuza uçuruldu!</div>
    
    <form id="compForm">
        <div class="group">
            <label>Adınız Soyadınız</label>
            <input type="text" id="userName" placeholder="Adınızı yazın..." required>
        </div>
        <div class="group">
            <label>Şikayet Konusu</label>
            <select id="cate" required>
                <option value="Tasarım / Arayüz">Tasarım Hataları</option>
                <option value="Sistem / Kod">Kodlama Problemi</option>
                <option value="Öneri">Önerim Var</option>
            </select>
        </div>
        <div class="group">
            <label>Şikayet Metni</label>
            <textarea id="txt" rows="4" placeholder="Sorunu anlatın..." required></textarea>
        </div>
        <div class="group">
            <label>Ekran Fotoğrafı</label>
            <input type="file" id="img" accept="image/*">
        </div>
        <button type="submit" class="btn">Direkt Yolla</button>
        <div id="netStatus" class="status">Bağlantı kuruluyor...</div>
    </form>
</div>

<script>
    // Telsiz gibi direkt bağlantı açıyoruz
    const peer = new Peer();
    let conn = null;

    peer.on('open', () => {
        document.getElementById('netStatus').innerText = "⚡ Güvenli ağa bağlanıldı.";
        // 2. Siteye (Havuzuna) direkt görünmez hat çekiyor
        conn = peer.connect('cipil-sikayet-havuzu-ozel');
    });

    let imgData = "";
    document.getElementById('img').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) { imgData = event.target.result; };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('compForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const packet = {
            name: document.getElementById('userName').value,
            category: document.getElementById('cate').value,
            text: document.getElementById('txt').value,
            image: imgData,
            time: new Date().toLocaleTimeString()
        };

        // Eğer bağlantı varsa veriyi direkt diğer telefona fırlatır
        if (conn) {
            conn.send(packet);
            document.getElementById('compForm').reset();
            imgData = "";
            const msg = document.getElementById('msg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        } else {
            alert("Alıcı site şu an açık değil! Lütfen şikayet havuzunu açın.");
        }
    });
</script>
</body>
</html>
