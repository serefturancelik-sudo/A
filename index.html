<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <h2>Gerçek Zamanlı Çipil Bridge</h2>
    <input type="file" id="fileInput">
    <button onclick="send()">Gönder</button>
    <div id="status"></div>

    <script>
        const socket = io();
        // Dosya geldi mi diye dinle
        socket.on('file_received', (data) => {
            alert("Yeni dosya alındı: " + data.filename);
            document.getElementById('status').innerText = "Son Gelen: " + data.filename;
        });

        async function send() {
            const file = document.getElementById('fileInput').files[0];
            const formData = new FormData();
            formData.append('data', file);
            await fetch('/transfer', {method: 'POST', body: formData});
        }
    </script>
</body>
</html>
