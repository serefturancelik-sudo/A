<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Osuruk Simülatörü</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  #stage {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
  }
  #character {
    font-size: 160px;
    transition: transform 0.12s ease-out;
    transform-origin: center bottom;
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.08));
  }
  #character.bend {
    transform: rotate(25deg) translateY(20px) scaleY(0.9);
  }
  #hud {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: #eee;
    letter-spacing: 1px;
  }
  #hud .score {
    font-size: 42px;
    font-weight: bold;
    color: #fff;
  }
  #hud .level {
    font-size: 18px;
    color: #999;
    margin-top: 4px;
  }
  .puff {
    position: absolute;
    font-size: 40px;
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: puffAnim 0.6s ease-out forwards;
  }
  @keyframes puffAnim {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5) rotate(0deg); }
    30%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-60%, -180%) scale(1.8) rotate(20deg); }
  }
  .rain-drop {
    position: absolute;
    top: -20px;
    width: 2px;
    height: 18px;
    background: linear-gradient(to bottom, rgba(200,200,200,0), rgba(200,200,200,0.7));
    pointer-events: none;
  }
  @keyframes fallDown {
    from { transform: translateY(0); }
    to   { transform: translateY(110vh); }
  }
  #hint {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    color: #555;
    font-size: 13px;
  }
</style>
</head>
<body>

<div id="stage">
  <div id="hud">
    <div class="score">Skor: <span id="scoreVal">0</span></div>
    <div class="level">Seviye <span id="levelVal">1</span></div>
  </div>

  <div id="character">🧍</div>

  <div id="hint">Karaktere tıkla</div>
</div>

<!-- Ses dosyası: fart.mp3 aynı klasörde bulunmalı -->
<audio id="fartAudio" src="fart.mp3" preload="auto"></audio>

<script>
(function () {
  const stage = document.getElementById('stage');
  const character = document.getElementById('character');
  const puff = document.getElementById('puff');
  const audio = document.getElementById('fartAudio');
  const scoreVal = document.getElementById('scoreVal');
  const levelVal = document.getElementById('levelVal');

  let score = 0;
  let level = 1;

  // audio.mp3 bulunamazsa Web Audio API ile sentetik osuruk sesi üretmek için yedek sistem
  let audioFileFailed = false;
  audio.addEventListener('error', () => { audioFileFailed = true; });

  let actx = null;

  // Gerçekçi osuruk sesi: düzensiz frekans + kekeleyen genlik + ıslak/patlamalı doku
  function playSyntheticFart(volume, intensity) {
    if (!actx) {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      actx = new AudioCtx();
    }
    if (actx.state === 'suspended') actx.resume();

    const t0 = actx.currentTime;
    const duration = Math.min(1.5, 0.55 + intensity * 0.08);
    const sampleRate = actx.sampleRate;
    const bufferSize = Math.floor(sampleRate * duration);

    const buffer = actx.createBuffer(1, bufferSize, sampleRate);
    const data = buffer.getChannelData(0);

    let phase = Math.random();
    let currentFreq = 65 + Math.random() * 55;

    const burstFreq = 3.5 + Math.random() * 2.5 + intensity * 0.5;
    const burstPhaseOffset = Math.random() * Math.PI * 2;
    const wetFreq = 9 + Math.random() * 4;

    for (let i = 0; i < bufferSize; i++) {
      const t = i / bufferSize;

      const targetFreq = (65 + Math.random() * 70) * (1 - 0.5 * t);
      currentFreq = currentFreq * 0.98 + targetFreq * 0.02;
      phase += currentFreq / sampleRate;
      const saw = 2 * (phase - Math.floor(phase)) - 1;

      const burst = 0.5 + 0.4 * Math.sin(t * Math.PI * 2 * burstFreq + burstPhaseOffset)
                        + 0.2 * Math.sin(t * Math.PI * 2 * burstFreq * 2.3)
                        + 0.15 * Math.sin(t * Math.PI * 2 * wetFreq);

      const noise = (Math.random() * 2 - 1);

      const attack = Math.min(1, t * 30);
      const decay = Math.pow(1 - t, 0.65);
      const envelope = attack * decay;

      const sampleVal = (saw * 0.5 + noise * 0.65) * burst * envelope;
      data[i] = Math.max(-1, Math.min(1, sampleVal));
    }

    const source = actx.createBufferSource();
    source.buffer = buffer;

    const filter = actx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.Q.value = 4;
    filter.frequency.setValueAtTime(1100, t0);
    filter.frequency.exponentialRampToValueAtTime(200, t0 + duration);

    const gain = actx.createGain();
    gain.gain.setValueAtTime(volume, t0);

    source.connect(filter);
    filter.connect(gain);
    gain.connect(actx.destination);

    source.start(t0);
    source.stop(t0 + duration);
  }

  function playFartSound() {
    const volume = Math.min(1, 0.3 + level * 0.07);

    if (!audioFileFailed) {
      try {
        audio.currentTime = 0;
        audio.volume = volume;
        const playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise.catch(() => {
            audioFileFailed = true;
            playSyntheticFart(volume, level);
          });
        }
      } catch (e) {
        audioFileFailed = true;
        playSyntheticFart(volume, level);
      }
    } else {
      playSyntheticFart(volume, level);
    }
  }

  function bendCharacter() {
    character.classList.add('bend');
    setTimeout(() => character.classList.remove('bend'), 180);
  }

  // Seviye arttıkça daha fazla gaz bulutu çıksın
  function showPuff() {
    const rect = character.getBoundingClientRect();
    const baseX = rect.left + rect.width / 2;
    const baseY = rect.top + rect.height * 0.75;

    const puffCount = Math.min(8, level); // seviye 1 = 1 puf, seviye 8+ = 8 puf

    for (let i = 0; i < puffCount; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'puff';
        p.textContent = '💨';
        const offsetX = (Math.random() - 0.5) * 40 * (1 + level * 0.1);
        const offsetY = (Math.random() - 0.5) * 15;
        p.style.left = (baseX + offsetX) + 'px';
        p.style.top = (baseY + offsetY) + 'px';
        p.style.fontSize = (30 + Math.random() * 20) + 'px';
        stage.appendChild(p);
        setTimeout(() => p.remove(), 700);
      }, i * 60);
    }
  }

  function spawnRain() {
    const dropCount = 40;
    for (let i = 0; i < dropCount; i++) {
      setTimeout(() => {
        const drop = document.createElement('div');
        drop.className = 'rain-drop';
        drop.style.left = Math.random() * 100 + 'vw';
        const fallDuration = 0.8 + Math.random() * 0.6;
        drop.style.animation = `fallDown ${fallDuration}s linear forwards`;
        stage.appendChild(drop);
        setTimeout(() => drop.remove(), fallDuration * 1000 + 100);
      }, i * 15);
    }
  }

  function handleClick() {
    score++;
    scoreVal.textContent = score;

    if (score % 10 === 0) {
      level++;
      levelVal.textContent = level;
      spawnRain();
    }

    bendCharacter();
    showPuff();
    playFartSound();
  }

  stage.addEventListener('click', handleClick);
  stage.addEventListener('touchstart', function (e) {
    e.preventDefault();
    handleClick();
  }, { passive: false });
})();
</script>

</body>
</html>
